<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pets</title>
    <link rel="icon" href="assets/img/pets-jennifer.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/typography.css" />
    <link rel="stylesheet" href="css/desktop.css" />
    <link rel="stylesheet" href="css/tablet.css" />
    <link rel="stylesheet" href="css/phone.css" />
</head>

<body>
    <div class="page">
        <header class="header header-light">
            <div class="logo logo-light">
                <h1>Cozy House</h1>
                <span>Shelter for pets in Boston</span>
            </div>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a class="nav-link nav-link-light" href="./#about">About the shelter</a></li>
                    <li><a class="nav-link nav-link-light  nav-activated" href="#our-pets">Our pets</a></li>
                    <li><a class="nav-link nav-link-light" href="./#help">Help the shelter</a></li>
                    <li><a class="nav-link nav-link-light" href="#contacts">Contacts</a></li>
                </ul>
            </nav>
        </header>
        <section class="pets" id="our-pets">
            <h2>Our friends who <br> are looking for a house</h2>

            <div class="slider">

                <div class="cards-wrap">
                    <div class="card">
                        <img src="assets/img/pets-katrine.png" alt="Katrine" class="card-img">
                        <h3 class="card-title">Katrine</h3>
                        <a href="#" class="button-secondary">Learn more</a>
                    </div>

                    <div class="card">
                        <img src="assets/img/pets-jennifer.png" alt="Jennifer" class="card-img">
                        <h3 class="card-title">Jennifer</h3>
                        <a href="#" class="button-secondary">Learn more</a>
                    </div>

                    <div class="card">
                        <img src="assets/img/pets-woody.png" alt="Woody" class="card-img">
                        <h3 class="card-title">Woody</h3>
                        <a href="#" class="button-secondary">Learn more</a>
                    </div>
                </div>

            </div>

        </section>
    </div>
    <script src="index.js"></script>
</body>

</html>
